name: CI

on:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'installer/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'installer/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      # Unit tests only need the pure-logic surface of GlDrive; the test
      # project references GlDrive.csproj, so this restores + builds both.
      # WinFsp/GnuTLS native bits come from NuGet (winfsp.net, FluentFTP.GnuTLS)
      # and aren't exercised by the tests (no mount / no live FTP).
      - name: Restore
        run: dotnet restore src/GlDrive.Tests/GlDrive.Tests.csproj -warnaserror:NU1901,NU1902,NU1903,NU1904

      - name: Build (Release)
        run: dotnet build src/GlDrive.Tests/GlDrive.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test src/GlDrive.Tests/GlDrive.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

      - name: Audit dependencies
        run: dotnet list src/GlDrive/GlDrive.csproj package --vulnerable --include-transitive
